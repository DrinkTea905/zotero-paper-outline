<vbox xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
      xmlns:html="http://www.w3.org/1999/xhtml">
  <groupbox>
    <label><html:h2 style="font-size:22px;">一个 AI 生成论文目录的插件</html:h2></label>

    <label><html:b>AI 接口</html:b></label>
    <hbox align="center">
      <label value="服务商：" style="min-width:7em"/>
      <menulist native="true" preference="extensions.paperoutline.provider">
        <menupopup>
          <menuitem value="deepseek" label="DeepSeek（默认）"/>
          <menuitem value="openai" label="OpenAI"/>
          <menuitem value="moonshot" label="月之暗面 Kimi"/>
          <menuitem value="zhipu" label="智谱 GLM"/>
          <menuitem value="qwen" label="通义千问 Qwen"/>
          <menuitem value="siliconflow" label="硅基流动 SiliconFlow"/>
          <menuitem value="ollama" label="本地 Ollama（免 Key）"/>
          <menuitem value="custom" label="自定义"/>
        </menupopup>
      </menulist>
    </hbox>
    <hbox align="center">
      <label value="API Key：" style="min-width:7em"/>
      <html:input type="password" style="width:32em"
        placeholder="本地 Ollama / 自定义 可不填"
        preference="extensions.paperoutline.apiKey"/>
    </hbox>
    <hbox align="center">
      <label value="模型：" style="min-width:7em"/>
      <html:input type="text" style="width:20em"
        placeholder="留空＝用所选服务商默认模型"
        preference="extensions.paperoutline.model"/>
    </hbox>
    <html:details style="margin:2px 0 0 0;">
      <html:summary style="cursor:pointer; color:#666; font-size:12px;">⚙ 高级</html:summary>
      <hbox align="center" style="margin-top:4px">
        <label value="API URL：" style="min-width:6em"/>
        <html:input type="text" style="width:34em"
          placeholder="留空＝用所选服务商默认地址；选「自定义」时必填"
          preference="extensions.paperoutline.apiUrl"/>
      </hbox>
    </html:details>

    <label><html:b>通用</html:b></label>
    <hbox align="center">
      <label value="识别目录层级：" style="min-width:7em"/>
      <menulist native="true" preference="extensions.paperoutline.maxLevel">
        <menupopup>
          <menuitem value="0" label="全部层级（默认）"/>
          <menuitem value="1" label="只到一级标题"/>
          <menuitem value="2" label="到二级标题"/>
          <menuitem value="3" label="到三级标题"/>
          <menuitem value="4" label="到四级标题"/>
        </menupopup>
      </menulist>
    </hbox>

    <label value="提示词（可直接修改；清空则恢复内置默认）："/>
    <html:textarea rows="6" style="width:40em"
      preference="extensions.paperoutline.prompt"></html:textarea>

    <html:details style="margin:6px 0 0 0;">
      <html:summary style="cursor:pointer; color:#666; font-size:12px;">⚙ 高级</html:summary>
      <vbox style="margin-top:4px">
        <hbox align="center">
          <label value="并发数：" style="min-width:7em"/>
          <html:input type="number" min="1" max="50" style="width:6em"
            preference="extensions.paperoutline.concurrency"/>
        </hbox>
        <hbox align="center">
          <label value="每块字数：" style="min-width:7em"/>
          <html:input type="number" min="2000" max="200000" style="width:8em"
            preference="extensions.paperoutline.maxCharsPerChunk"/>
        </hbox>
        <checkbox native="true" label="生成后另存为子笔记（目录已常驻阅读器大纲栏，一般无需开启）"
          preference="extensions.paperoutline.saveAsNote"/>
        <hbox align="center" style="margin-top:6px">
          <button label="🗑 清空所有目录缓存"
            oncommand="Zotero.PaperOutlineGPT &amp;&amp; Zotero.PaperOutlineGPT.clearAllCacheUI()"/>
        </hbox>
      </vbox>
    </html:details>

    <html:hr style="margin:14px 0; border:none; border-top:1px solid #ddd;"/>
    <html:details>
      <html:summary style="cursor:pointer; font-weight:bold; font-size:14px;">📖 使用帮助（新手必看）</html:summary>
      <html:div style="font-size:13px; line-height:1.8; padding:10px 4px; max-width:46em;">

        <html:p style="margin:0 0 10px;">本插件帮你用 AI 给论文自动生成
          <html:b>层级目录 + 每节摘要</html:b>，显示在阅读 PDF 时的左侧「大纲」栏，
          点一下就能跳到对应位置。</html:p>

        <html:h3 style="margin:12px 0 4px;">第一次使用（3 步）</html:h3>
        <html:ol style="margin:0; padding-left:1.4em;">
          <html:li><html:b>填 API Key</html:b>：服务商默认 DeepSeek，把申请到的 Key 粘进「API Key」框
            （申请方法见下）。用本地 Ollama 则免 Key。</html:li>
          <html:li><html:b>打开一篇 PDF</html:b>：双击文献的 PDF 附件打开阅读器。</html:li>
          <html:li><html:b>点左侧「大纲」标签 → 点「📑 生成目录」</html:b>：
            稍等十几秒目录就出来了；点目录任一条，PDF 自动翻到那一节。</html:li>
        </html:ol>

        <html:h3 style="margin:14px 0 4px;">如何申请 DeepSeek API Key（推荐，便宜好用）</html:h3>
        <html:ol style="margin:0; padding-left:1.4em;">
          <html:li>浏览器打开 <html:b>platform.deepseek.com</html:b>，用手机号注册并登录。</html:li>
          <html:li>进入左侧 <html:b>「API keys」</html:b> → 点 <html:b>「创建 API key」</html:b>，
            起个名字 → 复制生成的、以 <html:b>sk-</html:b> 开头的字符串（只显示一次，记得存好）。</html:li>
          <html:li>到 <html:b>「充值 / 余额」</html:b> 充一点额度即可（如 ¥10；按用量计费，
            生成一篇论文目录通常只要几分钱）。</html:li>
          <html:li>回到本设置：服务商选 <html:b>DeepSeek</html:b>，把 sk- 那串粘进 <html:b>API Key</html:b>，完成。</html:li>
        </html:ol>
        <html:p style="margin:4px 0 0; color:#666;">想换别家也行：服务商下拉里有 OpenAI / Kimi / 智谱 /
          通义 / 硅基流动 / 本地 Ollama，选了填对应的 Key 即可。</html:p>

        <html:h3 style="margin:14px 0 4px;">两种生成入口</html:h3>
        <html:ul style="margin:0; padding-left:1.4em;">
          <html:li><html:b>阅读时</html:b>：左侧「大纲」栏的「📑 生成目录」按钮（最常用）。</html:li>
          <html:li><html:b>批量</html:b>：文库列表里选中一篇或多篇 → 右键 →「🧾 AI 总结并生成目录」。</html:li>
        </html:ul>

        <html:h3 style="margin:14px 0 4px;">小贴士</html:h3>
        <html:ul style="margin:0; padding-left:1.4em;">
          <html:li>目录会自动缓存，下次打开同一篇<html:b>秒显示</html:b>，不必重新生成。</html:li>
          <html:li>对结果不满意？点目录底部「<html:b>↻ AI 重新生成</html:b>」重做一遍。</html:li>
          <html:li>想要更细 / 更粗的目录？用上面「<html:b>识别目录层级</html:b>」调，然后重新生成。</html:li>
        </html:ul>

        <html:h3 style="margin:14px 0 4px;">常见疑问</html:h3>
        <html:ul style="margin:0; padding-left:1.4em;">
          <html:li><html:b>大纲栏里看不到面板？</html:b>
            确认点的是阅读器左侧栏<html:b>最上面那排图标里的「大纲」</html:b>（不是缩略图 / 注释）。</html:li>
          <html:li><html:b>点条目跳得不太准？</html:b>
            少数 PDF（如部分知网 / 扫描件）读不出文字精确位置，会按比例估算，可能差一两页，属正常。</html:li>
          <html:li><html:b>关掉「另存为子笔记」会丢目录吗？</html:b>
            不会。目录单独保存、一直在大纲栏；笔记只是额外导出，默认不生成。</html:li>
          <html:li><html:b>要花钱吗？</html:b>
            用云端服务商按其 API 计费（通常很便宜）；想完全免费可装本地 Ollama 选它。</html:li>
        </html:ul>

        <html:div style="margin:20px 0 4px; padding-top:12px; border-top:1px dashed #dcdcdc; text-align:center;">
          <html:span style="font-family:'KaiTi','楷体','STKaiti',Georgia,serif; font-size:15px; font-style:italic; color:#8a6d3b; letter-spacing:1.5px;">by 独钓寒江雪 ＆ Claude</html:span>
        </html:div>
      </html:div>
    </html:details>
  </groupbox>
</vbox>
